<!DOCTYPE html>
<html>
<head>
    <title>FINANCES</title>
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <h1>FINANCE TRACKER</h1>
    <form method="POST">
        <input type="text" name="description" placeholder="Description" required
        style="width: 200px; padding: 10px; font-size: 16px;">
        <input type="number" step="0.01" name="amount" placeholder="Amount" required
        style="width: 100px; padding: 10px; font-size: 16px;">
        <select name="category" style="padding: 10px; font-size: 16px;">
            <option value="Food">Food</option>
            <option value="Rent">Rent</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>
        </select>
        <button type="submit">Add</button>
    </form>

    <hr>
    <table border="1" style="margin-left:auto;margin-right:auto;width: 60%;">
        <tr>
            <th>Description</th>
            <th>Amount ($)</th>
            <th>Category</th>
        </tr>
        {% for entry in finances %}
        <tr>
            <td>{{ entry.description }}</td>
            <td>{{ entry.amount }}</td>
            <td>{{ entry.category }}</td>
        </tr>
        {% endfor %}
    </table>

    <a class="back" href="/" style="display: block; margin-top: 20px; text-decoration: none; color: #b44446; font-weight: bold;">← Home</a>
</body>
</html>
